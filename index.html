<script>
const{useState,useEffect,useRef,useCallback}=React;
const h=React.createElement;

// ─── DESIGN TOKENS ────────────────────────────────────────────────────────────

// ─── SHARED UTILS ─────────────────────────────────────────────────────────────
const e$=n=>{const v=+(n||0);const[i,d]=v.toFixed(2).split(".");return i.replace(/\B(?=(\d{3})+(?!\d))/g,".")+","+d+" €";};
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,5);
const MES=["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
const store={
  load:(k,def)=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):def;}catch{return def;}},
  save:(k,d)=>{try{localStorage.setItem(k,JSON.stringify(d));}catch{}}
};
