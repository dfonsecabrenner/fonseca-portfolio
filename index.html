// ─── MODULE: HOME DASHBOARD ─────────────────────────────────────────────────────
function HomeDashboard({pisos,rePagos,finTxns,oposItems,shopItems,setMod}){
  const now=new Date();
  const mesKey=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,"0")}`;
  const rentaEsp=pisos.reduce((s,p)=>s+p.renta,0);
  const cobrado=rePagos.filter(p=>p.key===mesKey).reduce((s,p)=>s+p.monto,0);
  const gastoMes=finTxns.filter(t=>t.fecha.startsWith(mesKey)&&t.monto<0).reduce((s,t)=>s+Math.abs(t.monto),0);
  const oposPend=oposItems.filter(o=>o.status==="pendiente"||o.status==="vencido").length;
  const shopPend=shopItems.filter(s=>!s.done).length;
  const portfolioVal=pisos.filter(p=>p.precio).reduce((s,p)=>s+(p.precio||0),0);

  return h("div",null,
    h("div",{style:{marginBottom:24}},
      h("div",{style:{fontSize:11,fontWeight:600,color:T.mut,textTransform:"uppercase",letterSpacing:.8,marginBottom:5}},"Panel de control"),
      h("h1",{className:"serif",style:{margin:0,fontSize:30,fontWeight:700,color:T.txt}},"Fonseca Portfolio"),
      h("p",{style:{margin:"5px 0 0",color:T.mut,fontSize:13}},now.toLocaleDateString("es-ES",{weekday:"long",year:"numeric",month:"long",day:"numeric"}))
    ),
    // KPI row
    h("div",{style:{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:11,marginBottom:20}},
      [
        {label:"Portfolio value",val:e$(portfolioVal),color:T.ok,mod:"re"},
        {label:"Renta cobrada este mes",val:e$(cobrado),color:cobrado>=rentaEsp?T.ok:T.wrn,mod:"re"},
        {label:"Gasto personal mes",val:e$(gastoMes),color:T.err,mod:"finance"},
        {label:"OPOS pendiente",val:oposPend+" items",color:oposPend>0?T.err:T.ok,mod:"opos"},
        {label:"Lista de compras",val:shopPend+" items",color:T.txt,mod:"shopping"},
      ].map((k,i)=>h(Card,{key:i,style:{padding:16,cursor:"pointer",transition:"box-shadow .15s"},onClick:()=>setMod(k.mod)},
        h(KPI,{big:true,label:k.label,val:k.val,color:k.color})
      ))
    ),
    // Two column layout
    h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}},
      // RE summary
      h(Card,null,
        h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}},
          h("div",{style:{fontSize:13,fontWeight:700,color:T.txt}},"🏠 Real Estate — Estado mes"),
          h(Btn,{v:"g",sm:true,onClick:()=>setMod("re")},"Ver todo →")
        ),
        h("div",{style:{display:"flex",flexDirection:"column",gap:6}},
          pisos.map(p=>{
            const pago=rePagos.find(r=>r.pisoId===p.id&&r.key===mesKey);
            return h("div",{key:p.id,style:{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"6px 0",borderBottom:`1px solid ${T.brd}`}},
              h("div",{style:{display:"flex",alignItems:"center",gap:9}},
                h("span",{style:{width:8,height:8,borderRadius:"50%",background:pago?T.ok:T.err,display:"inline-block"}}),
                h("span",{style:{fontSize:13,fontWeight:700,color:T.acc}},p.id),
                h("span",{style:{fontSize:12,color:T.mut}},p.inq.n.split(" ").slice(0,2).join(" "))
              ),
              h("div",{className:"num",style:{fontSize:13,fontWeight:600,color:pago?T.ok:T.err}},pago?e$(pago.monto):"Pendiente")
            );
          })
        )
      ),
      // Finance + Shopping
      h("div",{style:{display:"flex",flexDirection:"column",gap:14}},
        // Finance top categories
        h(Card,null,
          h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}},

const IS={width:"100%",padding:"8px 11px",border:`1px solid ${T.brd}`,borderRadius:8,fontSize:13,background:T.card,color:T.txt};
const LBL={fontSize:11,fontWeight:700,color:T.mut,textTransform:"uppercase",letterSpacing:.6,display:"block",marginBottom:5};

function REDashboard({pisos,pagos,gastos,go,goToPiso,opMod,onAddPiso}){
  const now=new Date();
  const[mes,setMes]=useState(now.getMonth());
  const[año,setAño]=useState(now.getFullYear());
  const key=`${año}-${String(mes+1).padStart(2,"0")}`;
  const pm=pagos.filter(p=>p.key===key),gm=gastos.filter(g=>g.fecha&&g.fecha.startsWith(`${año}-${String(mes+1).padStart(2,"0")}`));
  const tE=pisos.reduce((s,p)=>s+p.renta,0),tC=pm.reduce((s,p)=>s+p.monto,0),tG=gm.reduce((s,g)=>s+g.monto,0);
  const prev=()=>mes===0?(setMes(11),setAño(a=>a-1)):setMes(m=>m-1);
  const next=()=>mes===11?(setMes(0),setAño(a=>a+1)):setMes(m=>m+1);
  // Group by proyecto
  const proyectos=[...new Set(pisos.map(p=>p.proyecto||"Sin proyecto"))];
  return h("div",null,
    h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:22}},
      h("div",null,
        h("div",{style:{fontSize:11,fontWeight:600,color:T.mut,textTransform:"uppercase",letterSpacing:.8,marginBottom:5}},"Real Estate"),
        h("h1",{className:"serif",style:{margin:0,fontSize:28,fontWeight:700,color:T.txt}},"Portafolio España"),
        h("p",{style:{margin:"5px 0 0",color:T.mut,fontSize:13}},pisos.length+" apartamentos")
      ),
      h("div",{style:{display:"flex",gap:9}},
        h(Btn,{v:"s",sm:true,onClick:()=>go("ext")},"⇄ Extracto"),
        h(Btn,{v:"s",sm:true,onClick:()=>opMod("pago")},"+  Pago"),
        h(Btn,{sm:true,onClick:onAddPiso},"+ Apartamento")
      )
    ),
    h("div",{style:{display:"flex",alignItems:"center",gap:12,marginBottom:18}},
      h("button",{onClick:prev,style:{border:`1px solid ${T.brd}`,background:T.card,width:32,height:32,borderRadius:8,color:T.mut,fontSize:16,display:"flex",alignItems:"center",justifyContent:"center"}},"‹"),
      h("span",{className:"serif",style:{fontSize:17,fontWeight:700,color:T.txt,minWidth:156,textAlign:"center"}},MES[mes]+" "+año),
      h("button",{onClick:next,style:{border:`1px solid ${T.brd}`,background:T.card,width:32,height:32,borderRadius:8,color:T.mut,fontSize:16,display:"flex",alignItems:"center",justifyContent:"center"}},"›")
    ),
    h("div",{style:{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12,marginBottom:24}},
      [{label:"Renta esperada",val:e$(tE)},{label:"Cobrado",val:e$(tC),color:T.ok},{label:"Pendiente",val:e$(Math.max(0,tE-tC)),color:tC<tE?T.err:T.ok},{label:"Gastos mes",val:e$(tG),color:T.mut}]
        .map((s,i)=>h(Card,{key:i,style:{padding:18}},h(KPI,{big:true,...s})))
    ),
    proyectos.map(proy=>h("div",{key:proy,style:{marginBottom:24}},
      h("div",{style:{fontSize:11,fontWeight:700,color:T.mut,textTransform:"uppercase",letterSpacing:.8,marginBottom:10}},"📍 "+proy),
      h("div",{style:{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12}},
        pisos.filter(p=>(p.proyecto||"Sin proyecto")===proy).map(p=>{
          const pago=pm.find(x=>x.pisoId===p.id),prop=p.tipo==="Propiedad";
          return h("div",{key:p.id,onClick:()=>goToPiso(p.id),
            style:{background:T.card,borderRadius:14,border:`1px solid ${T.brd}`,overflow:"hidden",position:"relative",cursor:"pointer",transition:"box-shadow .15s"},
            onMouseEnter:e=>e.currentTarget.style.boxShadow="0 4px 20px rgba(0,0,0,.1)",
            onMouseLeave:e=>e.currentTarget.style.boxShadow="none"},
            h("div",{style:{position:"absolute",top:0,left:0,width:4,height:"100%",background:pago?T.ok:T.err}}),
            h("div",{style:{padding:"16px 16px 16px 20px"}},
              h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}},
                h("div",null,
                  h("div",{style:{fontSize:26,fontWeight:800,color:T.acc,lineHeight:1}},p.id),
                  h("div",{style:{fontSize:12,color:T.mut,marginTop:3}},p.inq.n.split(" ").slice(0,2).join(" "))
                ),
                h(Tag,{tx:p.tipo,c:prop?"b":"a"})
              ),
              h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-end"}},
                h("div",null,
                  h("div",{style:{fontSize:11,color:T.mut,marginBottom:2}},"Renta mensual"),
                  h("div",{className:"num",style:{fontSize:15,fontWeight:600,color:T.txt}},e$(p.renta)),
                  pago?h("div",{className:"num",style:{fontSize:12,color:T.ok,marginTop:2}},"✓ "+e$(pago.monto))
                     :h("div",{style:{fontSize:12,color:T.err,marginTop:2}},"Sin registro")
                ),
                h("div",{style:{fontSize:12,color:T.mut}},"→")
              ),
              p.taurus&&h("div",{className:"num",style:{marginTop:8,padding:"4px 9px",background:T.aLt,borderRadius:6,fontSize:11,color:T.acc}},"Taurus "+e$(p.taurus)+" · neto "+e$(p.renta-p.taurus))
            )
          );
        })
      )
    ))
  );
}

function RealEstateModule({pisos,setPisos,rePagos,setRePagos,reGastos,setReGastos}){
  const[view,setView]=useState("dash");
  const[selPiso,setSelPiso]=useState(null);

  const[mp,setMp]=useState(null);
  const[showAddPiso,setShowAddPiso]=useState(false);
  const[exts,setExts]=useState(()=>store.load("re_exts",[]));
  const sP=d=>{setRePagos(d);store.save("re_p",d);};
  const sG=d=>{setReGastos(d);store.save("re_g",d);};
  const sE=d=>{setExts(d);store.save("re_exts",d);};
  const sPisos=d=>{setPisos(d);store.save("re_pisos",d);};
  const opMod=(t,p)=>{setMp(p||null);setModal(t);};

  const subNav=[

    {id:"alr",l:"Alertas ⚑"},{id:"ext",l:"Extracto"},{id:"pagos",l:"Pagos"},

        style:{padding:"6px 14px",borderRadius:7,border:"none",cursor:"pointer",background:view===t.id?T.card:"transparent",
          color:view===t.id?T.txt:T.mut,fontSize:12,fontWeight:view===t.id?600:400,boxShadow:view===t.id?"0 1px 4px rgba(0,0,0,.08)":"none"}},t.l))
    ),
    view==="dash"&&h(REDashboard,{pisos,pagos:rePagos,gastos:reGastos,go:setView,goToPiso,opMod,onAddPiso:()=>setShowAddPiso(true)}),
    view==="pisos"&&h(REPisos,{pisos,savePisos:sPisos,initialSel:selPiso,onSelChange:setSelPiso}),
    view==="inq"&&h(REInquilinos,{pisos,savePisos:sPisos}),
    view==="alr"&&h(REAlertas,null),
    view==="ext"&&h(REExtracto,{exts,saveExts:sE,pagos:rePagos,savePagos:sP,gastos:reGastos,saveGastos:sG}),
    view==="pagos"&&h(REPagos,{pagos:rePagos,savePagos:sP,pisos}),
    view==="gastos"&&h(REGastos,{gastos:reGastos,saveGastos:sG}),
    view==="fiscal"&&h(REFiscal,{pagos:rePagos,gastos:reGastos}),
    modal==="pago"&&h(REPagoForm,{pisoId:mp,pisos,onClose:()=>setModal(null),onSave:p=>{sP([...rePagos,p]);setModal(null);}}),
    modal==="gasto"&&h(REGastoForm,{pisos,onClose:()=>setModal(null),onSave:g=>{sG([...reGastos,g]);setModal(null);}}),
    showAddPiso&&h(AddPisoModal,{onClose:()=>setShowAddPiso(false),onSave:p=>{sPisos([...pisos,p]);setShowAddPiso(false);}})
  );
}

function REPisos({pisos,savePisos,initialSel,onSelChange}){
  const[sel,setSel]=useState(initialSel||null);
  const[tab,setTab]=useState("legal");
  const[editMode,setEditMode]=useState(false);
  const[editData,setEditData]=useState(null);
  const[newEmpad,setNewEmpad]=useState("");
  const[showEndTenant,setShowEndTenant]=useState(false);
  const[endDate,setEndDate]=useState("");
  const p=pisos.find(x=>x.id===sel);

  useEffect(()=>{if(initialSel){setSel(initialSel);}}, [initialSel]);
  const goBack=()=>{setSel(null);setEditMode(false);setTab("legal");if(onSelChange)onSelChange(null);};
  const select=id=>{setSel(id);setTab("legal");setEditMode(false);if(onSelChange)onSelChange(id);};

  const saveEdit=()=>{
    savePisos(pisos.map(x=>x.id===p.id?{...x,...editData}:x));
    setEditMode(false);setEditData(null);
  };
  const addEmpad=()=>{
    if(!newEmpad.trim())return;
    savePisos(pisos.map(x=>x.id===p.id?{...x,empadronados:[...(x.empadronados||[]),newEmpad.trim()]}:x));
    setNewEmpad("");
  };
  const removeEmpad=name=>savePisos(pisos.map(x=>x.id===p.id?{...x,empadronados:(x.empadronados||[]).filter(e=>e!==name)}:x));
  const endTenancy=()=>{
    const hist={n:p.inq.n,doc:p.inq.doc,inicio:p.inq.inicio,salida:endDate,nota:"Contrato finalizado"};
    savePisos(pisos.map(x=>x.id===p.id?{...x,historial:[...(x.historial||[]),hist],inq:{...x.inq,n:"—",doc:"—",inicio:"—",salida:endDate}}:x));
    setShowEndTenant(false);setEndDate("");
  };

  // ── DETAIL VIEW ──
  if(p){
    const es=(k,v)=>setEditData(d=>({...d,[k]:v}));
    const ei=(k,v)=>setEditData(d=>({...d,inq:{...d.inq,[k]:v}}));
    const ed=editMode?(editData||{...p}):p;
    const tabs=[{id:"legal",l:"Datos Legales"},{id:"inq",l:"Inquilino"},{id:"empad",l:"Empadronados"},{id:"hist",l:"Historial"},{id:"alr",l:"Alertas"}];
    return h("div",null,
      // Header
      h("div",{style:{display:"flex",alignItems:"center",gap:11,marginBottom:20,flexWrap:"wrap"}},
        h(Btn,{v:"g",sm:true,onClick:goBack},"← Volver"),
        h("div",{style:{fontSize:28,fontWeight:800,color:T.acc,fontFamily:"'Plus Jakarta Sans'"}},p.id),
        h(Tag,{tx:p.tipo,c:p.tipo==="Propiedad"?"b":"a"}),
        h("div",{style:{fontSize:13,color:T.mut}},p.proyecto||""),
        h("div",{style:{marginLeft:"auto",display:"flex",gap:8}},
          editMode
            ?[h(Btn,{key:"c",v:"s",sm:true,onClick:()=>{setEditMode(false);setEditData(null);}},"Cancelar"),h(Btn,{key:"s",sm:true,onClick:saveEdit},"✓ Guardar")]
            :h(Btn,{v:"s",sm:true,onClick:()=>{setEditMode(true);setEditData({...p,inq:{...p.inq}});}},"✏ Editar")
        )
      ),
      // Tabs
      h("div",{style:{display:"flex",gap:3,marginBottom:18,background:"#EDE5D8",padding:4,borderRadius:10}},
        tabs.map(t=>h("button",{key:t.id,onClick:()=>setTab(t.id),style:{padding:"6px 14px",borderRadius:7,border:"none",cursor:"pointer",background:tab===t.id?T.card:"transparent",color:tab===t.id?T.txt:T.mut,fontSize:12,fontWeight:tab===t.id?600:400,boxShadow:tab===t.id?"0 1px 4px rgba(0,0,0,.08)":"none"}},t.l))
      ),
      // TAB: LEGAL
      tab==="legal"&&h(Card,null,
        editMode
          ?h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}},
            [["Finca registral","finca"],["Ref. catastral","catastral"],["Superficie (m²)","sup"],["IBI 2025 (€)","ibi"],["Precio compra (€)","precio"],["Renta mensual (€)","renta"],["Proyecto/Grupo","proyecto"]].map(([label,key])=>
              h("div",{key},h("label",{style:LBL},label),h("input",{value:ed[key]||"",onChange:e=>es(key,e.target.value),style:IS}))
            )
          )
          :h("div",null,
            [["Finca registral",p.finca],["Ref. catastral",p.catastral],["Superficie",p.sup?p.sup+" m²":"—"],["IBI 2025",p.ibi?e$(p.ibi):"—"],["Precio compra",p.precio?e$(p.precio):"Subarriendo"],["Renta mensual",e$(p.renta)],["Proyecto",p.proyecto||"—"],["Pendiente Taurus",p.pendiente!=null&&p.pendiente>0?e$(p.pendiente):"—"]].map(([k,v])=>h(DRow,{key:k,k,v}))
          )
      ),
      // TAB: INQUILINO
      tab==="inq"&&h("div",null,
        h(Card,null,
          editMode
            ?h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}},
              [["Nombre completo","n"],["Documento","doc"],["Teléfono","tel"],["Email","email"],["Inicio contrato","inicio"],["Último incremento","ultimoInc"],["Iberdrola","ibe"],["Hidraqua","hid"]].map(([label,key])=>
                h("div",{key},h("label",{style:LBL},label),h("input",{value:(ed.inq||{})[key]||"",onChange:e=>ei(key,e.target.value),style:IS}))
              ),
              h("div",null,h("label",{style:LBL},"Fianza (€)"),h("input",{type:"number",value:(ed.inq||{}).fianza||"",onChange:e=>ei("fianza",e.target.value),style:IS})),
              h("div",{style:{gridColumn:"span 2"}},h("label",{style:LBL},"Notas"),h("textarea",{value:(ed.inq||{}).nota||"",onChange:e=>ei("nota",e.target.value),rows:2,style:{...IS,resize:"vertical"}}))
            )
            :h("div",null,
              [["Nombre",p.inq.n],["Documento",p.inq.doc],["Teléfono",p.inq.tel],["Email",p.inq.email],["Inicio contrato",p.inq.inicio],["Último incremento",p.inq.ultimoInc||"—"],["Renta actual",e$(p.renta)],["Fianza",p.inq.fianza?e$(p.inq.fianza):"Pendiente"],["Iberdrola",p.inq.ibe],["Hidraqua",p.inq.hid]].map(([k,v])=>h(DRow,{key:k,k,v})),
              p.inq.nota&&h("div",{style:{marginTop:9,padding:9,background:T.aLt,borderRadius:8,fontSize:12,color:T.acc}},p.inq.nota)
            )
        ),
        !editMode&&p.inq.n!=="—"&&h("div",{style:{marginTop:10}},
          h(Btn,{v:"s",sm:true,onClick:()=>setShowEndTenant(true)},"📤 Dar de baja inquilino")
        ),
        showEndTenant&&h("div",{style:{marginTop:12,padding:14,background:T.eLt,border:`1px solid #F5C6C6`,borderRadius:10}},
          h("div",{style:{fontSize:13,fontWeight:600,color:T.err,marginBottom:10}},"Fecha de salida de "+p.inq.n),
          h("input",{type:"date",value:endDate,onChange:e=>setEndDate(e.target.value),style:{...IS,width:"auto",marginRight:10}}),
          h("div",{style:{display:"flex",gap:8,marginTop:10}},
            h(Btn,{v:"s",sm:true,onClick:()=>setShowEndTenant(false)},"Cancelar"),
            h(Btn,{sm:true,style:{background:T.err},onClick:endTenancy},"Confirmar baja")
          )
        )
      ),
      // TAB: EMPADRONADOS
      tab==="empad"&&h(Card,null,
        h("div",{style:{fontSize:11,fontWeight:700,color:T.mut,textTransform:"uppercase",letterSpacing:.7,marginBottom:14}},"Personas empadronadas — "+p.id),
        (p.empadronados||[]).length===0
          ?h("div",{style:{color:T.mut,fontSize:13,marginBottom:14}},"Sin personas empadronadas registradas.")
          :h("div",{style:{marginBottom:14}},
            (p.empadronados||[]).map((e,i)=>h("div",{key:i,style:{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"9px 0",borderBottom:`1px solid ${T.brd}`}},

              h("button",{onClick:()=>removeEmpad(e),style:{border:"none",background:"none",color:T.mut,cursor:"pointer",fontSize:13}},"✕")

          h("input",{value:newEmpad,onChange:e=>setNewEmpad(e.target.value),onKeyDown:e=>e.key==="Enter"&&addEmpad(),placeholder:"Nombre completo...",style:{...IS,flex:1}}),

        (p.historial||[]).length===0
          ?h("div",{style:{color:T.mut,fontSize:13}},"Sin historial registrado.")
          :h("div",null,
            (p.historial||[]).map((h2,i)=>h(Card,{key:i,style:{padding:12,marginBottom:8,background:T.bg}},
              h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}},

                  h("div",{style:{fontSize:12,color:T.mut,marginTop:3}},h2.doc||"—")
                ),
                h("div",{style:{textAlign:"right",fontSize:12,color:T.mut}},
                  h("div",null,"Entrada: "+h2.inicio),
                  h("div",null,"Salida: "+h2.salida)

      )
    );
  }

  // ── LIST VIEW ──
  return h("div",null,
    h(SectionHeader,{title:"Pisos",sub:`${pisos.length} apartamentos`}),

  {id:"s2",cid:"sonnenglas",bf:"SG-2026-002",date:"15.03.2026",vendor:"DHL Express",amount:47.20,status:"uploaded",inv:false,gegenkonto:"4910",konto:"1220",bu:"401",payer:"",country:"DE",unmatched:false,approvedBy:"",approvedAt:"",comments:[{a:"Dani",d:"17.03.2026",t:"OK, procesando."}]},
  {id:"s3",cid:"sonnenglas",bf:"SG-2026-003",date:"10.03.2026",vendor:"Lufthansa Cargo",amount:512.00,status:"rejected",inv:true,gegenkonto:"4663",konto:"1220",bu:"",payer:"",country:"DE",unmatched:false,approvedBy:"",approvedAt:"",comments:[{a:"Dani",d:"12.03.2026",t:"Falta USt-IdNr. en la factura."}]},
];

function KanzleiModule({kClients,setKClients,kPos,setKPos}){
  const[client,setClient]=useState(kClients[0]?.id||"");
  const[subTab,setSubTab]=useState("opos");
  const[detail,setDetail]=useState(null);
  const[filterStatus,setFilterStatus]=useState("all");
  const[showAddClient,setShowAddClient]=useState(false);
  const[showAddPos,setShowAddPos]=useState(false);
  const[showMove,setShowMove]=useState(false);
  const[newComment,setNewComment]=useState("");
  const[batchFiles,setBatchFiles]=useState([]);
  const[batchDrag,setBatchDrag]=useState(false);
  const batchRef=useRef();
  const importRef=useRef();

  const cli=kClients.find(c=>c.id===client);
  const allPos=kPos.filter(p=>p.cid===client);
  const filtered=(filterStatus==="all"?allPos:filterStatus==="unmatched"?allPos.filter(p=>p.unmatched):allPos.filter(p=>p.status===filterStatus));
  const det=detail?kPos.find(p=>p.id===detail):null;
  const detIdx=detail?filtered.findIndex(p=>p.id===detail):-1;
  const counts={...Object.fromEntries(Object.keys(K_STATUS).map(s=>[s,allPos.filter(p=>p.status===s).length])),unmatched:allPos.filter(p=>p.unmatched).length};
  const totalAmt=allPos.reduce((s,p)=>s+p.amount,0);
  const pendAmt=allPos.filter(p=>p.status==="pending"||p.status==="uploaded").reduce((s,p)=>s+p.amount,0);
  const isLocked=p=>p?.status==="genehmigt";

  const updPos=(id,patch)=>setKPos(prev=>prev.map(p=>p.id===id?{...p,...patch}:p));
  const addComment=()=>{if(!newComment.trim()||!det)return;updPos(det.id,{comments:[...(det.comments||[]),{a:"Dani",d:new Date().toLocaleDateString("de-DE"),t:newComment.trim()}]});setNewComment("");};
  const approve=()=>{if(!det)return;updPos(det.id,{status:"genehmigt",approvedBy:"DFB",approvedAt:new Date().toLocaleString("de-DE")});};
  const unlock=()=>{if(!det)return;updPos(det.id,{status:"pending",approvedBy:"",approvedAt:""});};
  const moveBeleg=(targetCid)=>{if(!det)return;updPos(det.id,{cid:targetCid});setDetail(null);setShowMove(false);};

  const exportDATEV=()=>{
    const hdr=["Umsatz","Soll/Haben","WKZ","Kurs","Basis-Umsatz","WKZ","Konto","Gegenkonto","BU-Schlüssel","Belegdatum","Belegfeld 1","Buchungstext","Belegfeld 2"];
    const rows=allPos.filter(p=>p.status==="genehmigt"||p.status==="approved").map(p=>[
      p.amount.toFixed(2).replace(".",","),"S","EUR","","","",
      p.konto||"1220",p.gegenkonto||"4970",p.bu||"",
      (p.date||"").replace(/\./g,""),p.bf,p.vendor,""
    ]);
    if(!rows.length){alert("Keine genehmigten Belege zum Exportieren.");return;}
    const csv="\uFEFF"+[hdr,...rows].map(r=>r.join(";")).join("\r\n");
    const a=document.createElement("a");a.href=URL.createObjectURL(new Blob([csv],{type:"text/csv;charset=utf-8"}));
    a.download=`DATEV_${cli?.short||"Kanzlei"}_${new Date().toISOString().slice(0,10)}.csv`;a.click();
  };

  const importCSV=e=>{const file=e.target.files[0];if(!file)return;const r=new FileReader();r.onload=ev=>{const lines=ev.target.result.trim().split(/\r?\n/).slice(1);const newPs=lines.map(l=>{const c=l.split(",");const payer=c[6]||"";const gk=c[4]||"4970";return{id:uid(),cid:client,bf:c[0]||"",date:c[1]||"",vendor:c[2]||"",amount:parseFloat(c[3])||0,status:"pending",inv:false,gegenkonto:gk,konto:getKonto(payer),bu:c[5]||"",payer,country:c[7]||"DE",unmatched:false,approvedBy:"",approvedAt:"",comments:[]};});setKPos(prev=>[...prev,...newPs]);};r.readAsText(file);};

  // ── BATCH UPLOAD auto-parse ──
  const parseBatchFiles=files=>{
    const parsed=Array.from(files).map(f=>{
      const name=f.name.replace(/\.[^.]+$/,"");
      const gk=autoGK(name);
      const bfMatch=name.match(/REV\d+|SG-\d+-\d+|INV-\d+/i);
      const amtMatch=name.match(/(\d+[,.]?\d*)\s*€?/);
      return{id:uid(),cid:client,bf:bfMatch?bfMatch[0].toUpperCase():"",date:new Date().toLocaleDateString("de-DE"),
        vendor:name.replace(/REV\d+|SG-\d+-\d+|\d+[,.]?\d*€?/gi,"").replace(/[-_]/g," ").trim()||name,
        amount:amtMatch?parseFloat(amtMatch[1].replace(",",".")):0,
        status:"pending",inv:true,gegenkonto:gk||"4970",konto:"1220",bu:"",payer:"",country:"DE",
        unmatched:!gk,approvedBy:"",approvedAt:"",comments:[],fileName:f.name};
    });
    setBatchFiles(prev=>[...prev,...parsed]);
  };
  const confirmBatch=()=>{setKPos(prev=>[...prev,...batchFiles]);setBatchFiles([]);setSubTab("opos");};
  const updBatch=(id,k,v)=>setBatchFiles(prev=>prev.map(b=>b.id===id?{...b,[k]:v}:b));
  const removeBatch=id=>setBatchFiles(prev=>prev.filter(b=>b.id!==id));

  const StatusBadge=({s})=>h("span",{style:{padding:"3px 10px",borderRadius:12,fontSize:11,fontWeight:700,background:K_STATUS[s]?.bg||T.bg,color:K_STATUS[s]?.fg||T.mut,whiteSpace:"nowrap"}},K_STATUS[s]?.l||s);

  // ── DETAIL VIEW ──
  if(det){
    const locked=isLocked(det);
    const Fi=({label,fkey,type="text",opts})=>locked
      ?h(DRow,{k:label,v:opts?opts.find(o=>o.v===det[fkey])?.l||det[fkey]:det[fkey]||"—"})
      :h("div",{style:{marginBottom:10}},
        h("label",{style:LBL},label),
        opts
          ?h("select",{value:det[fkey]||"",onChange:e=>updPos(det.id,{[fkey]:e.target.value}),style:IS},opts.map(o=>h("option",{key:o.v,value:o.v},o.l)))
          :h("input",{type,value:det[fkey]||"",onChange:e=>updPos(det.id,{[fkey]:e.target.value}),style:IS})
      );
    return h("div",null,
      // Nav header
      h("div",{style:{display:"flex",alignItems:"center",gap:10,marginBottom:20,flexWrap:"wrap"}},
        h(Btn,{v:"g",sm:true,onClick:()=>setDetail(null)},"← Liste"),
        h("div",{style:{fontSize:16,fontWeight:700}},det.bf||"—"),
        h(StatusBadge,{s:det.status}),
        det.unmatched&&h("span",{style:{padding:"3px 10px",borderRadius:12,fontSize:11,fontWeight:700,background:T.eLt,color:T.err}},"⚠ Nicht zugeordnet"),
        !det.unmatched&&!locked&&h("span",{style:{padding:"3px 10px",borderRadius:12,fontSize:11,fontWeight:700,background:T.oLt,color:T.ok}},"✏ Editierbar"),
        h("div",{style:{marginLeft:"auto",display:"flex",gap:7,flexWrap:"wrap"}},
          // PREV / NEXT
          detIdx>0&&h(Btn,{v:"s",sm:true,onClick:()=>setDetail(filtered[detIdx-1].id)},"← Vorherige"),
          detIdx<filtered.length-1&&h(Btn,{v:"s",sm:true,onClick:()=>setDetail(filtered[detIdx+1].id)},"Nächste →"),
          h("span",{style:{fontSize:12,color:T.mut,alignSelf:"center"}},`${detIdx+1} / ${filtered.length}`),
          // Lock/Approve
          locked
            ?h(Btn,{v:"s",sm:true,onClick:unlock},"🔓 Freigabe aufheben")
            :h(Btn,{sm:true,style:{background:"#1C2B1E"},onClick:approve},"✓ Genehmigt DFB"),
          h(Btn,{v:"s",sm:true,onClick:()=>setShowMove(true)},"↔ Verschieben"),
          h(Btn,{v:"s",sm:true,onClick:exportDATEV},"↓ DATEV")
        )
      ),
      locked&&h("div",{style:{padding:"9px 14px",background:"#1C2B1E",borderRadius:8,marginBottom:14,fontSize:13,color:"#8AAF8E",display:"flex",gap:12}},
        h("span",null,"✓ Genehmigt von "+det.approvedBy),
        h("span",{style:{color:"#5A7F5E"}},det.approvedAt)
      ),
      h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}},
        // Left: Beleg data
        h(Card,null,
          h("div",{style:{fontSize:11,fontWeight:700,color:T.mut,textTransform:"uppercase",marginBottom:14}},"Beleg"),
          h(Fi,{label:"Belegfeld (REV#)",fkey:"bf"}),
          h(Fi,{label:"Datum",fkey:"date"}),
          h(Fi,{label:"Vendor / Lieferant",fkey:"vendor"}),
          h(Fi,{label:"Betrag (€)",fkey:"amount",type:"number"}),
          h(Fi,{label:"Land (ISO)",fkey:"country"}),
          h(Fi,{label:"Zahler / Payer",fkey:"payer"}),
          !locked&&h("div",{style:{display:"flex",alignItems:"center",gap:8,marginBottom:10}},
            h("input",{type:"checkbox",id:"inv_det",checked:!!det.inv,onChange:e=>updPos(det.id,{inv:e.target.checked}),style:{accentColor:T.acc}}),
            h("label",{htmlFor:"inv_det",style:{fontSize:13,cursor:"pointer"}},"Rechnung vorhanden")
          ),
          locked&&h(DRow,{k:"Rechnung",v:det.inv?"✅ Ja":"❌ Nein"}),
          h("div",{style:{borderTop:`1px solid ${T.brd}`,paddingTop:12,marginTop:4}}),
          // KONTO + GEGENKONTO side by side
          h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}},
            h(Fi,{label:"Konto (Soll)",fkey:"konto",opts:KONTEN}),
            h(Fi,{label:"Gegenkonto (Haben)",fkey:"gegenkonto",opts:GEGENKONTEN})
          ),
          h(Fi,{label:"BU-Schlüssel",fkey:"bu",opts:BU_KEYS}),
          // Status buttons
          !locked&&h("div",{style:{marginTop:4}},
            h("label",{style:LBL},"Status"),
            h("div",{style:{display:"flex",gap:7,flexWrap:"wrap"}},
              ["pending","uploaded","approved","rejected"].map(s=>h("button",{key:s,onClick:()=>updPos(det.id,{status:s}),
                style:{padding:"5px 12px",borderRadius:12,border:det.status===s?`2px solid ${K_STATUS[s].fg}`:`2px solid ${T.brd}`,background:K_STATUS[s].bg,color:K_STATUS[s].fg,fontSize:12,fontWeight:700,cursor:"pointer"}},K_STATUS[s].l))
            )
          )
        ),
        // Right: Comments + file
        h(Card,null,
          h("div",{style:{fontSize:11,fontWeight:700,color:T.mut,textTransform:"uppercase",marginBottom:12}},"Kommentare"),
          h("div",{style:{maxHeight:180,overflowY:"auto",marginBottom:12}},
            (det.comments||[]).length===0?h("div",{style:{color:T.mut,fontSize:13}},"Keine Kommentare."):
            (det.comments||[]).map((c,i)=>h("div",{key:i,style:{padding:"8px 0",borderBottom:`1px solid ${T.brd}`}},
              h("div",{style:{display:"flex",justifyContent:"space-between",marginBottom:3}},h("span",{style:{fontWeight:700,fontSize:12}},c.a),h("span",{style:{fontSize:11,color:T.mut}},c.d)),
              h("div",{style:{fontSize:13,lineHeight:1.5}},c.t)
            ))
          ),
          h("div",{style:{display:"flex",gap:8,marginBottom:16}},
            h("input",{value:newComment,onChange:e=>setNewComment(e.target.value),onKeyDown:e=>e.key==="Enter"&&addComment(),placeholder:"Kommentar hinzufügen...",style:{...IS,flex:1}}),
            h(Btn,{sm:true,onClick:addComment},"→")
          ),
          h("div",{style:{fontSize:11,fontWeight:700,color:T.mut,textTransform:"uppercase",marginBottom:8}},"Beleg-Datei"),
          det.fileName
            ?h("div",{style:{padding:"10px 12px",background:T.oLt,borderRadius:8,fontSize:13,color:T.ok,fontWeight:600}},"📎 "+det.fileName)
            :h("div",{style:{border:`2px dashed ${T.brd}`,borderRadius:10,padding:"16px",textAlign:"center",fontSize:13,color:T.mut}},"Noch keine Datei")
        )
      ),
      // Move modal
      showMove&&h("div",{style:{position:"fixed",inset:0,background:"rgba(10,15,12,.6)",zIndex:300,display:"flex",alignItems:"center",justifyContent:"center"},onClick:()=>setShowMove(false)},
        h("div",{style:{background:T.card,borderRadius:16,padding:24,width:320,boxShadow:"0 20px 60px rgba(0,0,0,.3)"},onClick:e=>e.stopPropagation()},
          h("div",{className:"serif",style:{fontSize:17,fontWeight:700,marginBottom:14}},"Beleg verschieben zu..."),
          h("div",{style:{display:"flex",flexDirection:"column",gap:8}},
            kClients.filter(c=>c.id!==client).map(c=>h(Btn,{key:c.id,v:"s",onClick:()=>moveBeleg(c.id),style:{justifyContent:"flex-start"}},c.name))
          )
        )
      )
    );
  }

  // ── BATCH REVIEW VIEW ──
  if(subTab==="batch"&&batchFiles.length>0)return h("div",null,
    h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}},
      h("div",null,
        h("h2",{className:"serif",style:{margin:0,fontSize:20,fontWeight:700}},"Batch-Import Review"),
        h("p",{style:{margin:"4px 0 0",color:T.mut,fontSize:13}},batchFiles.length+" Belege · "+batchFiles.filter(b=>b.unmatched).length+" nicht automatisch zugeordnet")
      ),
      h("div",{style:{display:"flex",gap:8}},
        h(Btn,{v:"s",sm:true,onClick:()=>setBatchFiles([])},"Abbrechen"),
        h(Btn,{sm:true,onClick:confirmBatch},"✓ Alle bestätigen ("+batchFiles.length+")")
      )
    ),
    batchFiles.filter(b=>b.unmatched).length>0&&h("div",{style:{padding:"9px 14px",background:T.eLt,border:`1px solid #F5C6C6`,borderRadius:8,marginBottom:16,fontSize:13,color:T.err}},
      "⚠ "+batchFiles.filter(b=>b.unmatched).length+" Belege konnten nicht automatisch zugeordnet werden. Bitte manuell prüfen."
    ),
    h(Card,{style:{padding:0,overflow:"hidden"}},
      h("table",{style:{width:"100%",borderCollapse:"collapse",tableLayout:"fixed"}},
        h("thead",null,h("tr",{style:{background:T.bg}},
          ["Datei","Belegfeld","Vendor","Betrag €","Konto","Gegenkonto","BU","⚠"].map((hd,i)=>h("th",{key:i,style:{padding:"8px 10px",textAlign:"left",fontSize:11,fontWeight:700,color:T.mut,textTransform:"uppercase",borderBottom:`1px solid ${T.brd}`}},hd))
        )),
        h("tbody",null,batchFiles.map((b,i)=>h("tr",{key:b.id,style:{borderBottom:`1px solid ${T.brd}`,background:b.unmatched?"#FEF9EC":i%2===0?T.card:"#FAF7F2"}},
          h("td",{style:{padding:"6px 8px",fontSize:11,color:T.mut,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",maxWidth:120}},b.fileName||b.vendor),
          h("td",{style:{padding:"4px 6px"}},h("input",{value:b.bf,onChange:e=>updBatch(b.id,"bf",e.target.value),style:{...IS,fontSize:12,padding:"4px 7px"}})),
          h("td",{style:{padding:"4px 6px"}},h("input",{value:b.vendor,onChange:e=>updBatch(b.id,"vendor",e.target.value),style:{...IS,fontSize:12,padding:"4px 7px"}})),
          h("td",{style:{padding:"4px 6px"}},h("input",{type:"number",value:b.amount,onChange:e=>updBatch(b.id,"amount",+e.target.value),style:{...IS,fontSize:12,padding:"4px 7px"}})),
          h("td",{style:{padding:"4px 6px"}},h("select",{value:b.konto,onChange:e=>updBatch(b.id,"konto",e.target.value),style:{...IS,fontSize:11,padding:"4px 6px"}},KONTEN.map(o=>h("option",{key:o.v,value:o.v},o.v)))),
          h("td",{style:{padding:"4px 6px"}},h("select",{value:b.gegenkonto,onChange:e=>{updBatch(b.id,"gegenkonto",e.target.value);updBatch(b.id,"unmatched",false);},style:{...IS,fontSize:11,padding:"4px 6px",background:b.unmatched?T.wLt:T.card}},GEGENKONTEN.map(o=>h("option",{key:o.v,value:o.v},o.v)))),
          h("td",{style:{padding:"4px 6px"}},h("select",{value:b.bu,onChange:e=>updBatch(b.id,"bu",e.target.value),style:{...IS,fontSize:11,padding:"4px 6px"}},BU_KEYS.map(o=>h("option",{key:o.v,value:o.v},o.v)))),
          h("td",{style:{padding:"6px 8px",textAlign:"center"}},
            b.unmatched?h("span",{style:{color:T.wrn,fontSize:14}},"⚠"):h("span",{style:{color:T.ok}},"✓"),
            h("button",{onClick:()=>removeBatch(b.id),style:{marginLeft:8,border:"none",background:"none",color:T.mut,cursor:"pointer",fontSize:13}},"✕")
          )
        )))
      )
    )
  );

  // ── MAIN LIST VIEW ──
  return h("div",null,
    h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:20}},
      h("div",null,
        h("h1",{className:"serif",style:{margin:0,fontSize:26,fontWeight:700,color:T.txt}},"Fonseca Kanzlei"),
        h("p",{style:{margin:"4px 0 0",color:T.mut,fontSize:13}},"OPOS · Belege · DATEV Export")
      ),
      h("div",{style:{display:"flex",gap:8,flexWrap:"wrap"}},
        h(Btn,{v:"s",sm:true,onClick:()=>importRef.current&&importRef.current.click()},"↑ CoWork CSV"),
        h("input",{ref:importRef,type:"file",accept:".csv",style:{display:"none"},onChange:importCSV}),
        h(Btn,{v:"s",sm:true,onClick:exportDATEV},"↓ DATEV Export"),
        h(Btn,{v:"s",sm:true,onClick:()=>setShowAddPos(true)},"+  Beleg"),
        h(Btn,{sm:true,onClick:()=>{setBatchFiles([]);setSubTab("batch")}},
          h("span",null,"⬆ Batch Upload"))
      )
    ),
    // Client tabs
    h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16,flexWrap:"wrap",gap:8}},
      h("div",{style:{display:"flex",gap:3,background:"#EDE5D8",padding:4,borderRadius:10,flexWrap:"wrap"}},
        kClients.map(c=>h("button",{key:c.id,onClick:()=>{setClient(c.id);setFilterStatus("all");setDetail(null);},
          style:{padding:"7px 16px",borderRadius:7,border:"none",cursor:"pointer",background:client===c.id?T.card:"transparent",color:client===c.id?T.txt:T.mut,fontSize:13,fontWeight:client===c.id?600:400,boxShadow:client===c.id?"0 1px 4px rgba(0,0,0,.08)":"none"}},
          c.short,h("span",{style:{marginLeft:6,fontSize:11,color:T.err,fontWeight:700}},kPos.filter(p=>p.cid===c.id&&p.status==="pending").length||"")
        )),
        h("button",{onClick:()=>setShowAddClient(true),style:{padding:"7px 12px",borderRadius:7,border:`1px dashed ${T.brd}`,background:"transparent",color:T.mut,fontSize:13,cursor:"pointer"}},
          "+ Mandant")
      ),
      h("div",{style:{display:"flex",gap:3,background:"#EDE5D8",padding:4,borderRadius:10}},
        [{id:"opos",l:"OPOS / Belege"},{id:"batch",l:"⬆ Batch Upload"},{id:"time",l:"⏱ Timetracking"}].map(t=>h("button",{key:t.id,onClick:()=>setSubTab(t.id),
          style:{padding:"6px 14px",borderRadius:7,border:"none",cursor:"pointer",background:subTab===t.id?T.card:"transparent",color:subTab===t.id?T.txt:T.mut,fontSize:12,fontWeight:subTab===t.id?600:400}},t.l))
      )
    ),
    // ── TIMETRACKING ──
    subTab==="time"&&h(Card,{style:{padding:40,textAlign:"center"}},
      h("div",{style:{fontSize:36,marginBottom:12}},"⏱"),
      h("div",{className:"serif",style:{fontSize:18,fontWeight:700,color:T.txt,marginBottom:8}},"Timetracking — Próximamente"),
      h("div",{style:{color:T.mut,fontSize:13,maxWidth:400,margin:"0 auto",lineHeight:1.8}},"Registro de horas por Mandant, proyecto y empleado. Exportación a factura automática.")
    ),
    // ── BATCH UPLOAD DROP ZONE ──
    subTab==="batch"&&h("div",null,
      h("div",{onDragOver:e=>{e.preventDefault();setBatchDrag(true);},onDragLeave:()=>setBatchDrag(false),
        onDrop:e=>{e.preventDefault();setBatchDrag(false);parseBatchFiles(e.dataTransfer.files);},
        onClick:()=>batchRef.current&&batchRef.current.click(),
        style:{border:`2px dashed ${batchDrag?T.acc:T.brd}`,borderRadius:14,padding:"52px 24px",textAlign:"center",cursor:"pointer",background:batchDrag?T.aLt:"#FAF7F2",marginBottom:16}},
        h("input",{ref:batchRef,type:"file",multiple:true,accept:".pdf,image/*",style:{display:"none"},onChange:e=>parseBatchFiles(e.target.files)}),
        h("div",{style:{fontSize:40,marginBottom:12}},"📂"),
        h("div",{className:"serif",style:{fontSize:17,fontWeight:700,marginBottom:7}},"Belege hochladen — alle auf einmal"),
        h("div",{style:{color:T.mut,fontSize:13,marginBottom:14}},"PDF oder Bilder · Automatische Zuordnung per Dateiname"),
        h(Btn,{v:"s",sm:true},"Dateien auswählen")
      ),
      batchFiles.length>0&&h("div",{style:{marginTop:8}},
        h("div",{style:{fontSize:13,color:T.mut,marginBottom:10}},batchFiles.length+" Dateien bereit zum Import"),
        h(Btn,{sm:true,onClick:()=>setSubTab("batch")},"Review & Bestätigen →")
      )
    ),
    // ── OPOS TABLE ──
    subTab==="opos"&&h("div",null,
      // KPI cards
      h("div",{style:{display:"grid",gridTemplateColumns:"repeat(6,1fr)",gap:9,marginBottom:16}},
        [
          {id:"all",label:"Total",val:allPos.length,color:T.txt},
          {id:"pending",label:"Pendiente",val:counts.pending||0,color:K_STATUS.pending.fg},
          {id:"uploaded",label:"Subido",val:counts.uploaded||0,color:K_STATUS.uploaded.fg},
          {id:"approved",label:"Aprobado",val:counts.approved||0,color:K_STATUS.approved.fg},
          {id:"genehmigt",label:"✓ DFB",val:counts.genehmigt||0,color:K_STATUS.genehmigt.fg},
          {id:"unmatched",label:"⚠ Sin asign.",val:counts.unmatched||0,color:T.wrn},
        ].map((k,i)=>h(Card,{key:i,style:{padding:"12px 14px",cursor:"pointer",border:filterStatus===k.id?`2px solid ${k.color||T.brd}`:`1px solid ${T.brd}`},onClick:()=>setFilterStatus(k.id)},
          h(KPI,{label:k.label,val:String(k.val),color:k.color})
        ))
      ),
      h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:16}},
        h(Card,{style:{padding:14}},h(KPI,{big:true,label:"Pendiente / Subido",val:e$(pendAmt),color:T.err})),
        h(Card,{style:{padding:14}},h(KPI,{big:true,label:"Total mes",val:e$(totalAmt),color:T.txt}))
      ),
      // Table
      h(Card,{style:{padding:0,overflow:"hidden"}},
        h("div",{style:{overflowX:"auto"}},
        h("table",{style:{width:"100%",borderCollapse:"collapse",minWidth:900}},
          h("thead",null,h("tr",{style:{background:T.bg}},
            ["Beleg","Datum","Vendor","Betrag","Konto","Gegenkonto","BU","Land","Status","⚠"].map((hd,i)=>h("th",{key:i,style:{padding:"9px 11px",textAlign:i>=3?"right":i>=7?"center":"left",fontSize:11,fontWeight:700,color:T.mut,textTransform:"uppercase",letterSpacing:.5,borderBottom:`1px solid ${T.brd}`,whiteSpace:"nowrap"}},hd))
          )),
          h("tbody",null,filtered.length===0
            ?h("tr",null,h("td",{colSpan:10,style:{padding:36,textAlign:"center",color:T.mut}},"Keine Belege."))
            :filtered.map((p,i)=>h("tr",{key:p.id,onClick:()=>setDetail(p.id),
              style:{borderBottom:`1px solid ${T.brd}`,background:p.unmatched?"#FEF9EC":i%2===0?T.card:"#FAF7F2",cursor:"pointer"},
              onMouseEnter:e=>e.currentTarget.style.background=T.aLt,
              onMouseLeave:e=>e.currentTarget.style.background=p.unmatched?"#FEF9EC":i%2===0?T.card:"#FAF7F2"},
              h("td",{className:"num",style:{padding:"9px 11px",fontSize:12,fontWeight:700}},p.bf),
              h("td",{className:"num",style:{padding:"9px 11px",fontSize:12,color:T.mut,whiteSpace:"nowrap"}},p.date),
              h("td",{style:{padding:"9px 11px",fontSize:13,maxWidth:160,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}},p.vendor),
              h("td",{className:"num",style:{padding:"9px 11px",fontWeight:700,fontSize:13,textAlign:"right"}},e$(p.amount)),
              h("td",{className:"num",style:{padding:"9px 11px",fontSize:12,color:T.mut,textAlign:"right"}},p.konto||"1220"),
              h("td",{className:"num",style:{padding:"9px 11px",fontSize:12,color:T.mut,textAlign:"right"}},p.gegenkonto||"—"),
              h("td",{className:"num",style:{padding:"9px 11px",fontSize:12,color:T.mut,textAlign:"right"}},p.bu||"—"),
              h("td",{style:{padding:"9px 11px",fontSize:12,color:T.mut,textAlign:"center"}},p.country||"—"),
              h("td",{style:{padding:"9px 11px",textAlign:"center"}},h(StatusBadge,{s:p.status})),
              h("td",{style:{padding:"9px 11px",textAlign:"center",fontSize:14}},p.unmatched?"⚠":"")
            ))
          )
        ))
      )
    ),
    // ADD CLIENT MODAL
    showAddClient&&h("div",{style:{position:"fixed",inset:0,background:"rgba(10,15,12,.6)",zIndex:300,display:"flex",alignItems:"center",justifyContent:"center"},onClick:()=>setShowAddClient(false)},
      h("div",{style:{background:T.card,borderRadius:16,padding:26,width:"100%",maxWidth:440,boxShadow:"0 20px 60px rgba(0,0,0,.3)"},onClick:e=>e.stopPropagation()},
        h("div",{style:{display:"flex",justifyContent:"space-between",marginBottom:18}},h("h2",{className:"serif",style:{margin:0,fontSize:19,fontWeight:700}},"Neuer Mandant"),h("button",{onClick:()=>setShowAddClient(false),style:{border:"none",background:"none",fontSize:20,color:T.mut}},"×")),
        h(NewClientForm,{onSave:c=>{setKClients(prev=>[...prev,c]);setClient(c.id);setShowAddClient(false);}})
      )
    ),
    // ADD BELEG MODAL
    showAddPos&&h("div",{style:{position:"fixed",inset:0,background:"rgba(10,15,12,.6)",zIndex:300,display:"flex",alignItems:"center",justifyContent:"center"},onClick:()=>setShowAddPos(false)},
      h("div",{style:{background:T.card,borderRadius:16,padding:26,width:"100%",maxWidth:500,boxShadow:"0 20px 60px rgba(0,0,0,.3)"},onClick:e=>e.stopPropagation()},
        h("div",{style:{display:"flex",justifyContent:"space-between",marginBottom:18}},h("h2",{className:"serif",style:{margin:0,fontSize:19,fontWeight:700}},"Neuer Beleg"),h("button",{onClick:()=>setShowAddPos(false),style:{border:"none",background:"none",fontSize:20,color:T.mut}},"×")),
        h(NewBelegForm,{cid:client,onSave:p=>{setKPos(prev=>[...prev,p]);setShowAddPos(false);}})
      )
    )
  );
}

function NewClientForm({onSave}){
  const[f,setF]=useState({name:"",short:"",email:""});
  const s=(k,v)=>setF(x=>({...x,[k]:v}));
  return h("div",{style:{display:"flex",flexDirection:"column",gap:12}},
    h("div",null,h("label",{style:LBL},"Name *"),h("input",{value:f.name,onChange:e=>s("name",e.target.value),placeholder:"Muster GmbH",style:IS})),
    h("div",null,h("label",{style:LBL},"Kürzel"),h("input",{value:f.short,onChange:e=>s("short",e.target.value),placeholder:"Muster",style:IS})),
    h("div",null,h("label",{style:LBL},"E-Mail Buchhaltung"),h("input",{value:f.email,onChange:e=>s("email",e.target.value),style:IS})),
    h("div",{style:{display:"flex",gap:9,justifyContent:"flex-end",marginTop:6}},
      h(Btn,{sm:true,onClick:()=>{if(!f.name.trim())return;onSave({id:uid(),name:f.name.trim(),short:f.short||f.name.split(" ")[0],email:f.email});},style:{opacity:f.name?1:.5}},"Mandant hinzufügen")
    )
  );
}

function NewBelegForm({cid,onSave}){
  const[f,setF]=useState({bf:"",date:new Date().toLocaleDateString("de-DE"),vendor:"",amount:"",konto:"1220",gegenkonto:"4970",bu:"",country:"DE",inv:false,payer:""});
  const s=(k,v)=>setF(x=>({...x,[k]:v}));
  const ok=f.bf&&f.vendor&&f.amount;
  return h("div",{style:{display:"flex",flexDirection:"column",gap:11}},
    h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}},
      h("div",null,h("label",{style:LBL},"Belegfeld *"),h("input",{value:f.bf,onChange:e=>s("bf",e.target.value),placeholder:"REV0001",style:IS})),
      h("div",null,h("label",{style:LBL},"Datum"),h("input",{value:f.date,onChange:e=>s("date",e.target.value),style:IS}))
    ),
    h("div",null,h("label",{style:LBL},"Vendor *"),h("input",{value:f.vendor,onChange:e=>{s("vendor",e.target.value);const gk=autoGK(e.target.value);if(gk)s("gegenkonto",gk);},style:IS})),
    h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}},
      h("div",null,h("label",{style:LBL},"Betrag (€) *"),h("input",{type:"number",value:f.amount,onChange:e=>s("amount",e.target.value),style:IS})),
      h("div",null,h("label",{style:LBL},"Land"),h("input",{value:f.country,onChange:e=>s("country",e.target.value),maxLength:2,style:IS}))
    ),
    h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}},
      h("div",null,h("label",{style:LBL},"Konto (Soll)"),h("select",{value:f.konto,onChange:e=>s("konto",e.target.value),style:IS},KONTEN.map(o=>h("option",{key:o.v,value:o.v},o.l)))),
      h("div",null,h("label",{style:LBL},"Gegenkonto (Haben)"),h("select",{value:f.gegenkonto,onChange:e=>s("gegenkonto",e.target.value),style:IS},GEGENKONTEN.map(o=>h("option",{key:o.v,value:o.v},o.l))))
    ),
    h("div",null,h("label",{style:LBL},"BU-Schlüssel"),h("select",{value:f.bu,onChange:e=>s("bu",e.target.value),style:IS},BU_KEYS.map(o=>h("option",{key:o.v,value:o.v},o.l)))),
    h("div",{style:{display:"flex",alignItems:"center",gap:8}},
      h("input",{type:"checkbox",id:"inv_new",checked:f.inv,onChange:e=>s("inv",e.target.checked),style:{accentColor:T.acc}}),
      h("label",{htmlFor:"inv_new",style:{fontSize:13,cursor:"pointer"}},"Rechnung vorhanden")
    ),
    h("div",{style:{display:"flex",gap:9,justifyContent:"flex-end",marginTop:4}},
      h(Btn,{sm:true,onClick:()=>{if(!ok)return;onSave({id:uid(),cid,...f,amount:+f.amount,status:"pending",unmatched:false,approvedBy:"",approvedAt:"",comments:[]});},style:{opacity:ok?1:.5}},"Beleg hinzufügen")
    )
  );
}

// ─── MODULE: SHOPPING ───────────────────────────────────────────────────────────
function ShoppingModule({items,setItems}){
  const[tienda,setTienda]=useState("ALDI");
  const[newItem,setNewItem]=useState("");
  const[newCat,setNewCat]=useState("General");
  const tiendaItems=items.filter(i=>i.tienda===tienda);
  const done=tiendaItems.filter(i=>i.done).length;
  const total=tiendaItems.length;
  const toggle=id=>setItems(prev=>prev.map(i=>i.id===id?{...i,done:!i.done}:i));
  const addItem=()=>{if(!newItem.trim())return;setItems(prev=>[...prev,{id:uid(),tienda,cat:newCat,item:newItem.trim(),done:false}]);setNewItem("");};
  const clearDone=()=>setItems(prev=>prev.filter(i=>!(i.tienda===tienda&&i.done)));
  const cats=tienda==="ALDI"?ALDI_CATS:["General"];
  const byCat=cats.map(cat=>({cat,items:tiendaItems.filter(i=>(tienda==="ALDI"?i.cat===cat:true)&&!i.done)})).filter(g=>tienda!=="ALDI"?g.items.length>0:true);
  const doneItems=tiendaItems.filter(i=>i.done);
  return h("div",null,
    h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:20}},
      h("div",null,
        h("h1",{className:"serif",style:{margin:0,fontSize:26,fontWeight:700,color:T.txt}},"Shopping"),
        h("p",{style:{margin:"4px 0 0",color:T.mut,fontSize:13}},`${total-done} pendientes · ${done} comprados`)
      ),
      done>0&&h(Btn,{v:"s",sm:true,onClick:clearDone},"✓ Limpiar comprados")
    ),
    h("div",{style:{display:"flex",gap:3,marginBottom:20,background:"#EDE5D8",padding:4,borderRadius:10}},
      TIENDAS.map(t=>h("button",{key:t,onClick:()=>setTienda(t),style:{padding:"7px 16px",borderRadius:7,border:"none",cursor:"pointer",background:tienda===t?T.card:"transparent",color:tienda===t?T.txt:T.mut,fontSize:13,fontWeight:tienda===t?600:400,boxShadow:tienda===t?"0 1px 4px rgba(0,0,0,.08)":"none"}},t,
        h("span",{style:{marginLeft:6,fontSize:11,color:tienda===t?T.err:T.brd,fontWeight:700}},items.filter(i=>i.tienda===t&&!i.done).length||"")
      ))
    ),
    // Add item
    h(Card,{style:{padding:12,marginBottom:16,display:"flex",gap:8,alignItems:"center"}},
      tienda==="ALDI"&&h("select",{value:newCat,onChange:e=>setNewCat(e.target.value),style:{padding:"8px 10px",border:`1px solid ${T.brd}`,borderRadius:8,fontSize:13,background:T.card,color:T.txt}},
        ALDI_CATS.map(c=>h("option",{key:c,value:c},c))
      ),
      h("input",{value:newItem,onChange:e=>setNewItem(e.target.value),onKeyDown:e=>e.key==="Enter"&&addItem(),placeholder:`Agregar a ${tienda}...`,style:{flex:1,padding:"8px 12px",border:`1px solid ${T.brd}`,borderRadius:8,fontSize:13,background:T.card}}),
      h(Btn,{sm:true,onClick:addItem},"+  Agregar")
    ),
    // Items by category
    h("div",{style:{display:"grid",gridTemplateColumns:tienda==="ALDI"?"repeat(2,1fr)":"1fr",gap:12}},
      byCat.map(({cat,items:catItems})=>catItems.length>0&&h(Card,{key:cat,style:{padding:14}},
        h("div",{style:{fontSize:11,fontWeight:700,color:T.mut,textTransform:"uppercase",letterSpacing:.7,marginBottom:10}},cat),
        catItems.map(item=>h("div",{key:item.id,onClick:()=>toggle(item.id),style:{display:"flex",alignItems:"center",gap:10,padding:"7px 4px",cursor:"pointer",borderBottom:`1px solid ${T.brd}`,opacity:item.done?.4:1}},
          h("div",{style:{width:20,height:20,border:`2px solid ${item.done?T.ok:T.brd}`,borderRadius:4,background:item.done?T.ok:"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,transition:"all .15s"}},
            item.done&&h("span",{style:{color:"#fff",fontSize:12,fontWeight:700}},"✓")
          ),
          h("span",{style:{fontSize:14,textDecoration:item.done?"line-through":"none",color:item.done?T.mut:T.txt}},item.item),
          h("button",{onClick:e=>{e.stopPropagation();setItems(prev=>prev.filter(i=>i.id!==item.id));},style:{marginLeft:"auto",border:"none",background:"none",color:T.brd,fontSize:14,cursor:"pointer",padding:"0 4px"}},"✕")
        ))
      ))
    ),
    // Done items
    doneItems.length>0&&h(Card,{style:{padding:14,marginTop:12,opacity:.6}},
      h("div",{style:{fontSize:11,fontWeight:700,color:T.mut,textTransform:"uppercase",letterSpacing:.7,marginBottom:10}},"✓ Comprados ({doneItems.length})"),
      doneItems.map(item=>h("div",{key:item.id,onClick:()=>toggle(item.id),style:{display:"flex",alignItems:"center",gap:10,padding:"6px 4px",cursor:"pointer",fontSize:13,color:T.mut,textDecoration:"line-through"}},
        h("div",{style:{width:18,height:18,borderRadius:4,background:T.ok,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}},h("span",{style:{color:"#fff",fontSize:11}},"✓")),
        item.item
      ))
    )
  );
}

// ─── ROOT APP ──────────────────────────────────────────────────────────────────
function App(){
  const[mod,setMod]=useState("home");
  const[pisos,setPisos]=useState(()=>{const saved=store.load("re_pisos",null);return saved||PISOS_BASE;});
  const[rePagos,setRePagos]=useState(()=>store.load("re_p",[]));
  const[reGastos,setReGastos]=useState(()=>store.load("re_g",[]));
  const[finTxns,setFinTxns]=useState(()=>store.load("fin_txns",FIN_SAMPLE));
  const[kClients,setKClients]=useState(()=>store.load("k_clients",K_CLIENTS_DEFAULT));
  const[kPos,setKPos]=useState(()=>store.load("k_pos",K_POSITIONS_DEFAULT));
  const[shopItems,setShopItems]=useState(()=>store.load("shop_items",SHOP_SAMPLE));
  useEffect(()=>store.save("fin_txns",finTxns),[finTxns]);
  useEffect(()=>store.save("k_clients",kClients),[kClients]);
  useEffect(()=>store.save("k_pos",kPos),[kPos]);
  useEffect(()=>store.save("shop_items",shopItems),[shopItems]);
  const alerts={re:PISOS_BASE.reduce((s,p)=>s+p.alertas.filter(a=>a.includes("URGENTE")).length,0),opos:kPos.filter(o=>o.status==="rejected").length};
  return h("div",{style:{display:"flex",height:"100vh",background:T.bg,overflow:"hidden"}},
    h(Sidebar,{mod,setMod,alerts}),
    h("main",{style:{flex:1,overflow:"auto",padding:"22px 26px"}},
      mod==="home"&&h(HomeDashboard,{pisos,rePagos,finTxns,oposItems:kPos,shopItems,setMod}),
      mod==="re"&&h(RealEstateModule,{pisos,setPisos,rePagos,setRePagos,reGastos,setReGastos}),
      mod==="finance"&&h(FinanceModule,{txns:finTxns,setTxns:setFinTxns}),
      mod==="opos"&&h(KanzleiModule,{kClients,setKClients,kPos,setKPos}),
      mod==="shopping"&&h(ShoppingModule,{items:shopItems,setItems:setShopItems})
    )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(h(App));
</script>
</body>
