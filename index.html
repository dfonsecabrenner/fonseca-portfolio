// DASHBOARD
function Dashboard({pisos,pagos,gastos,go,opMod}){
  const now=new Date();
  const[mes,setMes]=useState(now.getMonth());
  const[año,setAño]=useState(now.getFullYear());
  const key=`${año}-${String(mes+1).padStart(2,"0")}`;
  const pm=pagos.filter(p=>p.key===key);
  const gm=gastos.filter(g=>g.fecha&&g.fecha.startsWith(`${año}-${String(mes+1).padStart(2,"0")}`));
  const tE=pisos.reduce((s,p)=>s+p.renta,0),tC=pm.reduce((s,p)=>s+p.monto,0),tG=gm.reduce((s,g)=>s+g.monto,0);
  const prev=()=>mes===0?(setMes(11),setAño(a=>a-1)):setMes(m=>m-1);
  const next=()=>mes===11?(setMes(0),setAño(a=>a+1)):setMes(m=>m+1);
  return h("div",null,
    h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:22}},
      h("div",null,
        h("div",{style:{fontSize:11,fontWeight:600,color:T.mut,textTransform:"uppercase",letterSpacing:.8,marginBottom:5}},"Panel de control"),
        h("h1",{className:"serif",style:{margin:0,fontSize:28,fontWeight:700,color:T.txt}},"Buenos días, Rosemarie"),
        h("p",{style:{margin:"5px 0 0",color:T.mut,fontSize:13}},new Date().toLocaleDateString("es-ES",{weekday:"long",year:"numeric",month:"long",day:"numeric"}))
      ),
      h("div",{style:{display:"flex",gap:9}},
        h(Btn,{v:"s",sm:true,onClick:()=>go("ext")},"⇄ Cargar extracto"),
        h(Btn,{sm:true,onClick:()=>opMod("pago")},"+  Pago manual")
      )
    ),
    h("div",{style:{display:"flex",alignItems:"center",gap:12,marginBottom:18}},
      h("button",{onClick:prev,style:{border:`1px solid ${T.brd}`,background:T.card,width:32,height:32,borderRadius:8,color:T.mut,fontSize:16,display:"flex",alignItems:"center",justifyContent:"center"}},"‹"),
      h("span",{className:"serif",style:{fontSize:17,fontWeight:700,color:T.txt,minWidth:156,textAlign:"center"}},MES[mes]+" "+año),
      h("button",{onClick:next,style:{border:`1px solid ${T.brd}`,background:T.card,width:32,height:32,borderRadius:8,color:T.mut,fontSize:16,display:"flex",alignItems:"center",justifyContent:"center"}},"›")
    ),
    h("div",{style:{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12,marginBottom:20}},
      [{label:"Renta esperada",val:e$(tE)},{label:"Cobrado",val:e$(tC),color:T.ok},{label:"Pendiente",val:e$(Math.max(0,tE-tC)),color:tC<tE?T.err:T.ok},{label:"Gastos mes",val:e$(tG),color:T.mut}]
        .map((s,i)=>h(Card,{key:i,style:{padding:18}},h(KPI,{big:true,...s})))
    ),
    h("div",{style:{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12}},
      pisos.map(p=>{
        const pago=pm.find(x=>x.pisoId===p.id),prop=p.tipo==="Propiedad";
        return h("div",{key:p.id,style:{background:T.card,borderRadius:14,border:`1px solid ${T.brd}`,overflow:"hidden",position:"relative"}},
          h("div",{style:{position:"absolute",top:0,left:0,width:4,height:"100%",background:pago?T.ok:T.err,borderRadius:"14px 0 0 14px"}}),
          h("div",{style:{padding:"16px 16px 16px 20px"}},
            // Piso ID grande + tag centrado
            h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}},
              h("div",null,
                h("div",{style:{fontSize:26,fontWeight:800,color:T.acc,lineHeight:1,letterSpacing:"-0.5px"}},p.id),
                h("div",{style:{fontSize:12,color:T.mut,marginTop:3}},p.inq.n.split(" ").slice(0,2).join(" "))
              ),
              h(Tag,{tx:p.tipo,c:prop?"b":"a"})
            ),
            // Renta menos prominente
            h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-end"}},
              h("div",null,
                h("div",{style:{fontSize:11,color:T.mut,marginBottom:2}},"Renta mensual"),
                h("div",{className:"num",style:{fontSize:15,fontWeight:600,color:T.txt}},e$(p.renta)),
                pago
                  ?h("div",{className:"num",style:{fontSize:12,color:T.ok,marginTop:2}},"✓ cobrado "+e$(pago.monto))
                  :h("div",{style:{fontSize:12,color:T.err,marginTop:2}},"Sin registro este mes")
              ),
              h(Btn,{sm:true,v:pago?"s":"p",onClick:()=>opMod("pago",p.id)},pago?"+ Pago":"Registrar")

            p.taurus&&h("div",{className:"num",style:{marginTop:8,padding:"4px 9px",background:T.aLt,borderRadius:6,fontSize:11,color:T.acc}},"Taurus "+e$(p.taurus)+" · neto "+e$(p.renta-p.taurus))

}

              h("div",{style:{fontSize:12,color:T.mut,marginTop:2}},p.inq.n.split(" ").slice(0,2).join(" "))

    h("div",{style:{display:"flex",alignItems:"center",gap:11,marginBottom:20,flexWrap:"wrap"}},

    h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}},
      h(Card,null,

        [["Nombre completo",p.inq.n],["Documento",p.inq.doc],["Teléfono",p.inq.tel],["Email",p.inq.email]].map(([k,v])=>h(DRow,{key:k,k,v}))

// FISCAL — con exportar CSV + empty state
function Fiscal({pagos,gastos}){
  const[año,setAño]=useState(new Date().getFullYear());
  const pA=pagos.filter(p=>+p.año===año),gA=gastos.filter(g=>g.fecha&&g.fecha.startsWith(String(año)));
  const tI=pA.reduce((s,p)=>s+p.monto,0),tG=gA.reduce((s,g)=>s+g.monto,0),res=tI-tG,irnr=Math.max(0,res)*.19;
  const byP=PISOS_BASE.map(p=>({...p,i:pA.filter(x=>x.pisoId===p.id).reduce((s,x)=>s+x.monto,0),g:gA.filter(x=>x.pisoId===p.id).reduce((s,x)=>s+x.monto,0)})).map(p=>({...p,n:p.i-p.g}));
  const byCat={};gA.forEach(g=>{byCat[g.categoria]=(byCat[g.categoria]||0)+g.monto;});
  const byM=Array.from({length:12},(_,i)=>{const mk=`${año}-${String(i+1).padStart(2,"0")}`;return{m:MES[i].slice(0,3),i:pA.filter(p=>p.key===mk).reduce((s,p)=>s+p.monto,0),g:gA.filter(g=>g.fecha&&g.fecha.startsWith(mk)).reduce((s,g)=>s+g.monto,0)};});
  const mx=Math.max(...byM.map(x=>Math.max(x.i,x.g)),1);
  const isEmpty=!tI&&!tG;

  const exportCSV=()=>{
    const rows=[["Tipo","Piso","Categoría","Descripción","Importe (€)","Fecha","Mes","Año"]];
    pA.forEach(p=>{
      const piso=PISOS_BASE.find(x=>x.id===p.pisoId);
      rows.push(["Ingreso",p.pisoId||"","Renta cobrada",piso?piso.inq.n:"—",p.monto,p.fecha||"",MES[+p.mes]||"",p.año||""]);

    rows.push([]);
    rows.push(["RESUMEN","","","","","","",""]);
    rows.push(["Total ingresos","","","",tI,"","",""]);
    rows.push(["Total gastos","","","",tG,"","",""]);
    rows.push(["Base imponible","","","",res,"","",""]);
    rows.push(["IRNR 19%","","","",irnr,"","",""]);
    const csv="\uFEFF"+rows.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(";")).join("\r\n");
    const blob=new Blob([csv],{type:"text/csv;charset=utf-8"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");a.href=url;a.download=`Fiscal_Alcoy_${año}.csv`;a.click();URL.revokeObjectURL(url);
  };

  return h("div",null,
    h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20,flexWrap:"wrap",gap:10}},

        h("h1",{className:"serif",style:{margin:0,fontSize:26,fontWeight:700,color:T.txt}},"Resumen Fiscal"),

    h("div",{style:{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:11,marginBottom:18}},
      [{label:"Ingresos",val:e$(tI),color:T.ok},{label:"Gastos deducibles",val:e$(tG),color:T.err},{label:"Base imponible",val:e$(res),color:res>=0?T.txt:T.ok},{label:"IRNR estimado (19%)",val:e$(irnr),color:irnr>0?T.err:T.ok,sx:{background:irnr>0?T.eLt:T.oLt}}]
        .map((s,i)=>h(Card,{key:i,style:{padding:16,...(s.sx||{})}},h(KPI,{big:true,label:s.label,val:s.val,color:s.color})))
    ),

// ROOT
function App(){
  const[view,setView]=useState("dash");
  const[pisos,setPisos]=useState(PISOS_BASE);
  const[pagos,setPagos]=useState([]);
  const[gastos,setGastos]=useState([]);
  const[exts,setExts]=useState([]);
  const[loading,setLoading]=useState(true);
  const[modal,setModal]=useState(null);
  const[mp,setMp]=useState(null);

  useEffect(()=>{
    setPagos(store.load("fi_p"));
    setGastos(store.load("fi_g"));
    setExts(store.load("fi_e"));
    const inqOv=store.load("fi_inq",null);
    if(inqOv)setPisos(PISOS_BASE.map(p=>inqOv[p.id]?{...p,inq:{...p.inq,...inqOv[p.id]}}:p));
    setLoading(false);
  },[]);

  const sP=d=>{setPagos(d);store.save("fi_p",d);};
  const sG=d=>{setGastos(d);store.save("fi_g",d);};
  const sE=d=>{setExts(d);store.save("fi_e",d);};
  const sPisos=d=>{
    setPisos(d);
    const ov={};d.forEach(p=>{ov[p.id]=p.inq;});
    store.save("fi_inq",ov);
  };
  const opMod=(t,p)=>{setMp(p||null);setModal(t);};

  if(loading)return h("div",{style:{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",background:T.bg,gap:10,fontSize:14,color:T.mut}},"🏡 Cargando Fonseca Immobilien...");

  return h("div",{style:{display:"flex",height:"100vh",background:T.bg,overflow:"hidden"}},
    h(Sidebar,{view,go:setView}),
    h("main",{style:{flex:1,overflow:"auto",padding:"22px 26px"}},
      view==="dash"&&h(Dashboard,{pisos,pagos,gastos,go:setView,opMod}),
      view==="pisos"&&h(Pisos,{pisos}),
      view==="inq"&&h(Inquilinos,{pisos,savePisos:sPisos}),
      view==="alr"&&h(Alertas),
      view==="ext"&&h(Extracto,{exts,saveExts:sE,pagos,savePagos:sP,gastos,saveGastos:sG}),
      view==="pagos"&&h(Pagos,{pagos,savePagos:sP}),
      view==="gastos"&&h(Gastos,{gastos,saveGastos:sG}),
      view==="fiscal"&&h(Fiscal,{pagos,gastos})
    ),
    modal==="pago"&&h(PagoForm,{pisoId:mp,onClose:()=>setModal(null),onSave:p=>{sP([...pagos,p]);setModal(null);}}),
    modal==="gasto"&&h(GastoForm,{onClose:()=>setModal(null),onSave:g=>{sG([...gastos,g]);setModal(null);}})
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(h(App));
</script>
</body>
</html>
